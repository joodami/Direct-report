<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกการปฏิบัติงาน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
        .header-banner { background: linear-gradient(135deg, #1e3a8a, #3b82f6); color: white; padding: 45px 20px; border-radius: 0 0 50px 50px; }
        .main-card { border: none; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); margin-top: -40px; }
        
        /* ขยาย textarea ตามเนื้อหา */
        textarea { resize: none; overflow: hidden; min-height: 45px; }
        
        .preview-label { font-weight: bold; color: #1e3a8a; font-size: 0.85rem; }
        .preview-value { margin-bottom: 12px; color: #333; border-bottom: 1px solid #f1f5f9; padding-bottom: 4px; white-space: pre-wrap; }
        .img-preview-box { width: 100%; border-radius: 12px; display: none; margin-top: 10px; border: 2px dashed #cbd5e1; }
        .modal-img { width: 100%; border-radius: 12px; max-height: 180px; object-fit: contain; background: #f1f5f9; }
    </style>
</head>
<body>

<div class="header-banner text-center shadow">
    <h2 class="fw-bold">บันทึกการปฏิบัติงาน</h2>
    <p>โรงเรียนพิมานพิทยาสรรค์</p>
</div>

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card main-card p-4 p-md-5">
                <form id="reportForm">
                    <div class="mb-3"><label class="fw-bold">วันที่ปฏิบัติงาน</label><input type="date" id="date" class="form-control" required></div>
                    <div class="mb-3"><label class="fw-bold">เรื่อง</label><textarea id="subject" class="form-control auto-height" rows="1" required></textarea></div>
                    <div class="mb-3"><label class="fw-bold">รายละเอียดการปฏิบัติงานและผลการปฏิบัติงาน</label><textarea id="detail" class="form-control auto-height" rows="2" required></textarea></div>
                    <div class="mb-3"><label class="fw-bold">ข้อเสนอแนะ</label><textarea id="suggestion" class="form-control auto-height" rows="1"></textarea></div>
                    <div class="mb-4"><label class="fw-bold">ชื่อผู้บันทึก</label><input type="text" id="recorder" class="form-control" required></div>

                    <div class="row mb-4">
                        <div class="col-6"><label class="small fw-bold">รูปประกอบ 1</label><input type="file" id="img1" class="form-control" accept="image/*" required><img id="v1" class="img-preview-box"></div>
                        <div class="col-6"><label class="small fw-bold">รูปประกอบ 2</label><input type="file" id="img2" class="form-control" accept="image/*" required><img id="v2" class="img-preview-box"></div>
                    </div>
                    <button type="button" class="btn btn-primary w-100 py-3 fw-bold rounded-pill" onclick="showPreview()">🔍 ตรวจสอบข้อมูลก่อนส่ง</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="pModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 rounded-4 shadow-lg">
            <div class="modal-header"><h5 class="fw-bold text-primary">ตรวจสอบข้อมูล</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body px-4">
                <div class="row">
                    <div class="col-6"><p class="preview-label">ผู้บันทึก:</p><p id="pRec" class="preview-value"></p></div>
                    <div class="col-6"><p class="preview-label">วันที่:</p><p id="pDate" class="preview-value"></p></div>
                    <div class="col-12"><p class="preview-label">เรื่อง:</p><p id="pSub" class="preview-value"></p></div>
                    <div class="col-12"><p class="preview-label">รายละเอียด:</p><p id="pDet" class="preview-value"></p></div>
                    <div class="col-12"><p class="preview-label">ข้อเสนอแนะ:</p><p id="pSug" class="preview-value"></p></div>
                </div>
                <div class="row g-2">
                    <div class="col-6"><img id="pv1" class="modal-img"></div>
                    <div class="col-6"><img id="pv2" class="modal-img"></div>
                </div>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-light rounded-pill" data-bs-dismiss="modal">แก้ไข</button>
                <button type="button" class="btn btn-primary rounded-pill px-4" onclick="doSubmit()">✅ บันทึกข้อมูล</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbxMjxnMTPdSR_R8hZNivLhIr-8k4wKun7xs-DsHNUTNvpoVhz4SF8gEetNm5YD_-gwu/exec";
    let b1 = "", b2 = "";

    // ปรับความสูง textarea อัตโนมัติ
    document.querySelectorAll('.auto-height').forEach(t => {
        t.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        });
    });

    function handleFile(id, view, ref) {
        document.getElementById(id).addEventListener('change', e => {
            const f = e.target.files[0];
            const r = new FileReader();
            r.onload = ev => {
                if(ref === 1) b1 = ev.target.result; else b2 = ev.target.result;
                const img = document.getElementById(view);
                img.src = ev.target.result; img.style.display = 'block';
            };
            r.readAsDataURL(f);
        });
    }
    handleFile('img1', 'v1', 1); handleFile('img2', 'v2', 2);

    function getThaiDate(v) {
        const d = new Date(v);
        const months = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
        const str = d.getDate() + " " + months[d.getMonth()] + " " + (d.getFullYear() + 543);
        return str.replace(/[0-9]/g, s => ["๐","๑","๒","๓","๔","๕","๖","๗","๘","๙"][s]);
    }

    function showPreview() {
        const d = {
            date: document.getElementById('date').value,
            sub: document.getElementById('subject').value,
            det: document.getElementById('detail').value,
            rec: document.getElementById('recorder').value
        };
        if(!d.date || !d.sub || !d.rec || !b1 || !b2) return Swal.fire('ข้อมูลไม่ครบ', '', 'warning');
        
        document.getElementById('pRec').innerText = d.rec;
        document.getElementById('pDate').innerText = getThaiDate(d.date);
        document.getElementById('pSub').innerText = d.sub;
        document.getElementById('pDet').innerText = d.det;
        document.getElementById('pSug').innerText = document.getElementById('suggestion').value || "-";
        document.getElementById('pv1').src = b1;
        document.getElementById('pv2').src = b2;
        new bootstrap.Modal(document.getElementById('pModal')).show();
    }

    async function doSubmit() {
        bootstrap.Modal.getInstance(document.getElementById('pModal')).hide();
        Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        
        const body = {
            date: document.getElementById('date').value,
            subject: document.getElementById('subject').value,
            detail: document.getElementById('detail').value,
            suggestion: document.getElementById('suggestion').value,
            recorder: document.getElementById('recorder').value,
            image1: b1, image2: b2
        };

        try {
            const res = await fetch(APP_URL, { method: 'POST', body: JSON.stringify(body) });
            const data = await res.json();
// ค้นหาช่วงบรรทัดที่ตรวจสอบ if(result.status === 'success') หรือ if(data.status === 'success')
if (data.status === 'success') {
    Swal.fire({
        icon: 'success',
        title: 'บันทึกสำเร็จ!',
        text: 'ระบบสร้างไฟล์รายงานเรียบร้อยแล้วค่ะ',
        confirmButtonText: '📂 ดูรายงาน PDF', // ปรับข้อความปุ่มตรงนี้
        confirmButtonColor: '#1e3a8a',      // ปรับสีปุ่มให้เข้ากับโทนโรงเรียน
        allowOutsideClick: false
    }).then((result) => {
        if (result.isConfirmed) {
            // เมื่อคลิกปุ่ม "ดูรายงาน PDF" ให้เปิดหน้าต่างใหม่
            window.open(data.viewUrl, '_blank');
        }
    });

    // ล้างค่าในฟอร์มหลังจากบันทึกเสร็จ
    document.getElementById('reportForm').reset();
    document.querySelectorAll('.img-preview-box').forEach(i => i.style.display = 'none');
    b1 = b2 = ""; 
}
        } catch (e) { Swal.fire('เกิดข้อผิดพลาด', e.toString(), 'error'); }
    }
</script>
</body>
</html>
