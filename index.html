<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกการปฏิบัติงาน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap');
    
    body { 
        font-family: 'Sarabun', sans-serif; 
        background-color: #f4f6f9; 
        color: #334155;
        margin: 0;
        padding: 0;
    }

    /* แบนเนอร์ใหม่: เรียบ ตรง เป็นทางการ น้ำเงินเข้มขอบทอง */
    .header-banner { 
        background: linear-gradient(135deg, #1e3a8a 0%, #1a3675 100%);
        color: white; 
        padding: 50px 20px 80px 20px; /* เพิ่มพื้นที่ด้านล่างเพื่อให้การ์ดเกย */
        border-bottom: 5px solid #fbbf24; /* เส้นขอบทองเรียบๆ */
        position: relative;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        /* ลบ border-radius ออกเพื่อให้เป็นทรงตรง */
    }

    /* จัดวางโลโก้และชื่อระบบคู่กัน */
    .brand-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px; /* ระยะห่างระหว่างโลโก้และชื่อ */
        margin-bottom: 10px;
    }

    .school-logo {
        height: 60px; /* ขนาดโลโก้ */
        width: auto;
        filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); /* เพิ่มมิติให้โลโก้ */
    }

    .header-banner h2 {
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: 0.5px;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        margin: 0;
    }

    .header-banner p {
        font-size: 1rem;
        opacity: 0.85;
        font-weight: 400;
        margin-top: 5px;
    }

    /* การ์ดกรอกข้อมูล: ดูสะอาดตา เกยแบนเนอร์ขึ้นไปเล็กน้อย */
    .main-card { 
        border: none; 
        border-radius: 15px; /* โค้ดที่การ์ดนิดหน่อยให้ดูทันสมัย */
        box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.1), 0 10px 15px -5px rgba(0, 0, 0, 0.05);
        margin-top: -50px; /* ให้การ์ดเกยขึ้นไปบนแบนเนอร์ */
        background: rgba(255, 255, 255, 1);
        border: 1px solid rgba(226, 232, 240, 1);
    }

    /* ส่วนอื่นๆ คงเดิมเพื่อความเสถียร */
    .form-label { font-weight: 700; color: #1e3a8a; margin-bottom: 8px; font-size: 0.95rem; }
    .form-control { border: 1px solid #e2e8f0; padding: 12px 15px; transition: all 0.3s; border-radius: 8px; }
    .form-control:focus { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
    .btn-primary { background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%); border: none; padding: 15px; font-size: 1.1rem; border-radius: 10px; transition: transform 0.2s, box-shadow 0.2s; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(30, 58, 138, 0.3); background: linear-gradient(135deg, #1e40af 0%, #1d4ed8 100%); }
    .preview-label { font-weight: bold; color: #1e3a8a; font-size: 0.85rem; text-transform: uppercase; }
    .preview-value { margin-bottom: 15px; color: #1e293b; border-bottom: 1px solid #f1f5f9; padding-bottom: 6px; line-height: 1.6; white-space: pre-wrap; }
    .img-preview-box { width: 100%; border-radius: 8px; display: none; margin-top: 10px; border: 2px dashed #cbd5e1; }
    .modal-img { width: 100%; border-radius: 8px; max-height: 180px; object-fit: contain; background: #f1f5f9; }
</style>
</head>
<body>

<div class="header-banner text-center shadow">
    <div class="container">
        <div class="brand-wrapper">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e0/Phiman_Phittayasan_School_Logo.png" alt="โลโก้โรงเรียน" class="school-logo">
            <h2 class="fw-bold">บันทึกการปฏิบัติงาน</h2>
        </div>
        <p>โรงเรียนพิมานพิทยาสรรค์</p>
    </div>
</div>

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card main-card p-4 p-md-5">
                <form id="reportForm">
                    <div class="mb-3"><label class="fw-bold">วันที่ปฏิบัติงาน</label><input type="date" id="date" class="form-control" required></div>
                    <div class="mb-3"><label class="fw-bold">เรื่อง</label><textarea id="subject" class="form-control auto-height" rows="1" required></textarea></div>
                    <div class="mb-3"><label class="fw-bold">รายละเอียดการปฏิบัติงานและผลการปฏิบัติงาน</label><textarea id="detail" class="form-control auto-height" rows="2" required></textarea></div>
                    <div class="mb-3"><label class="fw-bold">ข้อเสนอแนะ</label><textarea id="suggestion" class="form-control auto-height" rows="1"></textarea></div>
                    <div class="mb-4"><label class="fw-bold">ชื่อผู้บันทึก</label><input type="text" id="recorder" class="form-control" required></div>

                    <div class="row mb-4">
                        <div class="col-6"><label class="small fw-bold">รูปประกอบ 1</label><input type="file" id="img1" class="form-control" accept="image/*" required><img id="v1" class="img-preview-box"></div>
                        <div class="col-6"><label class="small fw-bold">รูปประกอบ 2</label><input type="file" id="img2" class="form-control" accept="image/*" required><img id="v2" class="img-preview-box"></div>
                    </div>
                    <button type="button" class="btn btn-primary w-100 py-3 fw-bold rounded-pill" onclick="showPreview()">🔍 ตรวจสอบข้อมูลก่อนส่ง</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="pModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 rounded-4 shadow-2xl">
            <div class="modal-header bg-light border-0 px-4 py-3">
                <h5 class="fw-bold text-primary mb-0">📝 ตรวจสอบความถูกต้องของข้อมูล</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body px-4 pt-4">
                <div class="row">
                    <div class="col-md-6"><p class="preview-label">🗓️ วันที่ปฏิบัติงาน</p><p id="pDate" class="preview-value fw-bold"></p></div>
                    <div class="col-md-6"><p class="preview-label">👤 ชื่อผู้บันทึก</p><p id="pRec" class="preview-value fw-bold"></p></div>
                    <div class="col-12"><p class="preview-label">📌 เรื่อง</p><p id="pSub" class="preview-value"></p></div>
                    <div class="col-12"><p class="preview-label">📄 รายละเอียดการปฏิบัติงาน</p><p id="pDet" class="preview-value"></p></div>
                    <div class="col-12"><p class="preview-label">💡 ข้อเสนอแนะเพิ่มเติม</p><p id="pSug" class="preview-value italic text-muted"></p></div>
                </div>
                <div class="row g-3 mt-2">
                    <div class="col-6"><p class="small text-center text-muted mb-1">รูปภาพประกอบ 1</p><img id="pv1" class="modal-img border shadow-sm"></div>
                    <div class="col-6"><p class="small text-center text-muted mb-1">รูปภาพประกอบ 2</p><img id="pv2" class="modal-img border shadow-sm"></div>
                </div>
            </div>
            <div class="modal-footer border-0 bg-light rounded-bottom-4 px-4 py-3">
                <button type="button" class="btn btn-outline-secondary rounded-pill px-4" data-bs-dismiss="modal">แก้ไขข้อมูล</button>
                <button type="button" class="btn btn-primary rounded-pill px-5 fw-bold" onclick="doSubmit()">ยืนยันและบันทึกรายงาน</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbxMjxnMTPdSR_R8hZNivLhIr-8k4wKun7xs-DsHNUTNvpoVhz4SF8gEetNm5YD_-gwu/exec";
    let b1 = "", b2 = "";

    // ปรับความสูง textarea อัตโนมัติ
    document.querySelectorAll('.auto-height').forEach(t => {
        t.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        });
    });

    function handleFile(id, view, ref) {
        document.getElementById(id).addEventListener('change', e => {
            const f = e.target.files[0];
            const r = new FileReader();
            r.onload = ev => {
                if(ref === 1) b1 = ev.target.result; else b2 = ev.target.result;
                const img = document.getElementById(view);
                img.src = ev.target.result; img.style.display = 'block';
            };
            r.readAsDataURL(f);
        });
    }
    handleFile('img1', 'v1', 1); handleFile('img2', 'v2', 2);

    function getThaiDate(v) {
        const d = new Date(v);
        const months = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
        const str = d.getDate() + " " + months[d.getMonth()] + " " + (d.getFullYear() + 543);
        return str.replace(/[0-9]/g, s => ["๐","๑","๒","๓","๔","๕","๖","๗","๘","๙"][s]);
    }

    function showPreview() {
        const d = {
            date: document.getElementById('date').value,
            sub: document.getElementById('subject').value,
            det: document.getElementById('detail').value,
            rec: document.getElementById('recorder').value
        };
        if(!d.date || !d.sub || !d.rec || !b1 || !b2) return Swal.fire('ข้อมูลไม่ครบ', '', 'warning');
        
        document.getElementById('pRec').innerText = d.rec;
        document.getElementById('pDate').innerText = getThaiDate(d.date);
        document.getElementById('pSub').innerText = d.sub;
        document.getElementById('pDet').innerText = d.det;
        document.getElementById('pSug').innerText = document.getElementById('suggestion').value || "-";
        document.getElementById('pv1').src = b1;
        document.getElementById('pv2').src = b2;
        new bootstrap.Modal(document.getElementById('pModal')).show();
    }

    async function doSubmit() {
        bootstrap.Modal.getInstance(document.getElementById('pModal')).hide();
        Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        
        const body = {
            date: document.getElementById('date').value,
            subject: document.getElementById('subject').value,
            detail: document.getElementById('detail').value,
            suggestion: document.getElementById('suggestion').value,
            recorder: document.getElementById('recorder').value,
            image1: b1, image2: b2
        };

        try {
            const res = await fetch(APP_URL, { method: 'POST', body: JSON.stringify(body) });
            const data = await res.json();
// ค้นหาช่วงบรรทัดที่ตรวจสอบ if(result.status === 'success') หรือ if(data.status === 'success')
if (data.status === 'success') {
    Swal.fire({
        icon: 'success',
        title: 'บันทึกสำเร็จ!',
        text: 'ระบบสร้างไฟล์รายงานเรียบร้อยแล้วค่ะ',
        confirmButtonText: '📂 ดูรายงาน PDF', // ปรับข้อความปุ่มตรงนี้
        confirmButtonColor: '#1e3a8a',      // ปรับสีปุ่มให้เข้ากับโทนโรงเรียน
        allowOutsideClick: false
    }).then((result) => {
        if (result.isConfirmed) {
            // เมื่อคลิกปุ่ม "ดูรายงาน PDF" ให้เปิดหน้าต่างใหม่
            window.open(data.viewUrl, '_blank');
        }
    });

    // ล้างค่าในฟอร์มหลังจากบันทึกเสร็จ
    document.getElementById('reportForm').reset();
    document.querySelectorAll('.img-preview-box').forEach(i => i.style.display = 'none');
    b1 = b2 = ""; 
}
        } catch (e) { Swal.fire('เกิดข้อผิดพลาด', e.toString(), 'error'); }
    }
</script>
</body>
</html>
