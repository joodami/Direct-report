<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกการปฏิบัติงาน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap');
    
    body { 
        font-family: 'Sarabun', sans-serif; 
        background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        margin: 0;
        padding: 20px 15px;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
    }

    /* การ์ดหลัก: ปรับให้ดูพรีเมียมและสมดุล */
    .main-card { 
        width: 100%;
        max-width: 600px;
        background: #ffffff;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.8);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        overflow: hidden;
        margin-top: 20px;
    }

    /* ส่วนหัวข้อภายในการ์ด (Header Inside Card) */
    .card-header-custom {
        padding: 35px 25px 25px 25px;
        text-align: center;
        background: linear-gradient(to bottom, #ffffff, #f8fafc);
        border-bottom: 1px solid #f1f5f9;
    }

    .icon-box {
        width: 55px;
        height: 55px;
        background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
        color: #fbbf24;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 16px;
        margin: 0 auto 15px auto;
        font-size: 28px;
        box-shadow: 0 10px 20px rgba(30, 58, 138, 0.2);
    }

    .card-header-custom h2 {
        color: #0f172a;
        font-size: 1.5rem;
        font-weight: 700;
        margin: 0;
        letter-spacing: 0.5px;
    }

    .header-line {
        width: 40px;
        height: 4px;
        background: #fbbf24;
        margin: 12px auto 0 auto;
        border-radius: 10px;
    }

    .card-body { padding: 30px !important; }

    /* ปรับแต่ง Input ให้ดูพรีเมียมสะอาดตา */
    .form-label { 
        font-weight: 700; 
        color: #475569; 
        font-size: 0.85rem; 
        margin-bottom: 8px;
        display: block;
    }

    .form-control { 
        border: 1px solid #e2e8f0; 
        border-radius: 12px; 
        padding: 12px 15px;
        background-color: #fcfdfe;
        font-size: 16px !important;
        transition: all 0.3s ease;
    }

    .form-control:focus { 
        border-color: #3b82f6; 
        background-color: #fff;
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.08); 
    }

    /* ปุ่มส่งข้อมูล */
    .btn-primary { 
        background: #1e3a8a;
        border: none; 
        padding: 16px; 
        font-weight: bold;
        border-radius: 15px;
        width: 100%;
        transition: all 0.3s;
        margin-top: 10px;
    }

    .btn-primary:hover { 
        background: #1e40af;
        transform: translateY(-2px);
        box-shadow: 0 8px 15px rgba(30, 58, 138, 0.2);
    }

    /* ปรับปรุงสำหรับมือถือ */
    @media (max-width: 576px) {
        body { padding: 10px; }
        .main-card { border-radius: 20px; margin-top: 10px; }
        .card-header-custom { padding: 30px 20px 20px 20px; }
        .card-header-custom h2 { font-size: 1.3rem; }
        .card-body { padding: 20px !important; }
        .icon-box { width: 45px; height: 45px; font-size: 22px; }
    }
</style>
</head>
<body>
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-7 col-md-9">
            <div class="card main-card shadow-lg border-0" style="border-radius: 24px; overflow: hidden;">
                
                <div class="card-header-custom text-center pt-5 pb-4" style="background: linear-gradient(to bottom, #ffffff, #f8fafc); border-bottom: 1px solid #f1f5f9;">
                    <div class="icon-box mb-3" style="width: 60px; height: 60px; background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%); color: #fbbf24; display: flex; align-items: center; justify-content: center; border-radius: 18px; margin: 0 auto; font-size: 30px; box-shadow: 0 10px 20px rgba(30, 58, 138, 0.2);">
                        📑
                    </div>
                    <h2 class="fw-bold" style="color: #0f172a; font-size: 1.6rem; letter-spacing: 0.5px; margin: 0;">บันทึกการปฏิบัติงาน</h2>
                    <div style="width: 40px; height: 4px; background: #fbbf24; margin: 12px auto 0 auto; border-radius: 10px;"></div>
                </div>

                <div class="card-body p-4 p-md-5">
                    <form id="reportForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold" style="color: #475569; font-size: 0.9rem;">🗓️ วันที่ปฏิบัติงาน</label>
                            <input type="date" id="date" class="form-control" style="border-radius: 12px; padding: 12px;" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold" style="color: #475569; font-size: 0.9rem;">📌 เรื่อง</label>
                            <textarea id="subject" class="form-control auto-height" rows="1" style="border-radius: 12px; padding: 12px;" placeholder="ระบุหัวข้อรายงาน" required></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold" style="color: #475569; font-size: 0.9rem;">📄 รายละเอียดการปฏิบัติงานและผลการปฏิบัติงาน</label>
                            <textarea id="detail" class="form-control auto-height" rows="3" style="border-radius: 12px; padding: 12px;" placeholder="ระบุรายละเอียด..." required></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold" style="color: #475569; font-size: 0.9rem;">💡 ข้อเสนอแนะ</label>
                            <textarea id="suggestion" class="form-control auto-height" rows="1" style="border-radius: 12px; padding: 12px;" placeholder="ระบุข้อเสนอแนะ (ถ้ามี)"></textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold" style="color: #475569; font-size: 0.9rem;">👤 ผู้บันทึก</label>
                            <input type="text" id="recorder" class="form-control" style="border-radius: 12px; padding: 12px;" placeholder="ชื่อ-นามสกุล" required>
                        </div>

                        <div class="row mb-4 g-3">
                            <div class="col-6">
                                <label class="small fw-bold text-muted">📸 รูปประกอบ 1</label>
                                <input type="file" id="img1" class="form-control form-control-sm" accept="image/*" required>
                                <img id="v1" class="img-preview-box mt-2" style="width: 100%; border-radius: 10px; display: none; border: 1px solid #e2e8f0;">
                            </div>
                            <div class="col-6">
                                <label class="small fw-bold text-muted">📸 รูปประกอบ 2</label>
                                <input type="file" id="img2" class="form-control form-control-sm" accept="image/*" required>
                                <img id="v2" class="img-preview-box mt-2" style="width: 100%; border-radius: 10px; display: none; border: 1px solid #e2e8f0;">
                            </div>
                        </div>

                        <button type="button" class="btn btn-primary w-100 py-3 fw-bold rounded-pill shadow" onclick="showPreview()" style="background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%); border: none;">
                            🔍 ตรวจสอบข้อมูลก่อนส่ง
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="pModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 rounded-4 shadow-2xl">
            <div class="modal-header bg-light border-0 px-4 py-3">
                <h5 class="fw-bold text-primary mb-0">📝 ตรวจสอบความถูกต้องของข้อมูล</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body px-4 pt-4">
                <div class="row">
                    <div class="col-md-6"><p class="preview-label">🗓️ วันที่ปฏิบัติงาน</p><p id="pDate" class="preview-value fw-bold"></p></div>
                    <div class="col-md-6"><p class="preview-label">👤 ชื่อผู้บันทึก</p><p id="pRec" class="preview-value fw-bold"></p></div>
                    <div class="col-12"><p class="preview-label">📌 เรื่อง</p><p id="pSub" class="preview-value"></p></div>
                    <div class="col-12"><p class="preview-label">📄 รายละเอียดการปฏิบัติงาน</p><p id="pDet" class="preview-value"></p></div>
                    <div class="col-12"><p class="preview-label">💡 ข้อเสนอแนะเพิ่มเติม</p><p id="pSug" class="preview-value italic text-muted"></p></div>
                </div>
                <div class="row g-3 mt-2">
                    <div class="col-6"><p class="small text-center text-muted mb-1">รูปภาพประกอบ 1</p><img id="pv1" class="modal-img border shadow-sm"></div>
                    <div class="col-6"><p class="small text-center text-muted mb-1">รูปภาพประกอบ 2</p><img id="pv2" class="modal-img border shadow-sm"></div>
                </div>
            </div>
            <div class="modal-footer border-0 bg-light rounded-bottom-4 px-4 py-3">
                <button type="button" class="btn btn-outline-secondary rounded-pill px-4" data-bs-dismiss="modal">แก้ไขข้อมูล</button>
                <button type="button" class="btn btn-primary rounded-pill px-5 fw-bold" onclick="doSubmit()">ยืนยันและบันทึกรายงาน</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbxMjxnMTPdSR_R8hZNivLhIr-8k4wKun7xs-DsHNUTNvpoVhz4SF8gEetNm5YD_-gwu/exec";
    let b1 = "", b2 = "";

    // ปรับความสูง textarea อัตโนมัติ
    document.querySelectorAll('.auto-height').forEach(t => {
        t.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        });
    });

    function handleFile(id, view, ref) {
        document.getElementById(id).addEventListener('change', e => {
            const f = e.target.files[0];
            const r = new FileReader();
            r.onload = ev => {
                if(ref === 1) b1 = ev.target.result; else b2 = ev.target.result;
                const img = document.getElementById(view);
                img.src = ev.target.result; img.style.display = 'block';
            };
            r.readAsDataURL(f);
        });
    }
    handleFile('img1', 'v1', 1); handleFile('img2', 'v2', 2);

    function getThaiDate(v) {
        const d = new Date(v);
        const months = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
        const str = d.getDate() + " " + months[d.getMonth()] + " " + (d.getFullYear() + 543);
        return str.replace(/[0-9]/g, s => ["๐","๑","๒","๓","๔","๕","๖","๗","๘","๙"][s]);
    }

    function showPreview() {
        const d = {
            date: document.getElementById('date').value,
            sub: document.getElementById('subject').value,
            det: document.getElementById('detail').value,
            rec: document.getElementById('recorder').value
        };
        if(!d.date || !d.sub || !d.rec || !b1 || !b2) return Swal.fire('ข้อมูลไม่ครบ', '', 'warning');
        
        document.getElementById('pRec').innerText = d.rec;
        document.getElementById('pDate').innerText = getThaiDate(d.date);
        document.getElementById('pSub').innerText = d.sub;
        document.getElementById('pDet').innerText = d.det;
        document.getElementById('pSug').innerText = document.getElementById('suggestion').value || "-";
        document.getElementById('pv1').src = b1;
        document.getElementById('pv2').src = b2;
        new bootstrap.Modal(document.getElementById('pModal')).show();
    }

    async function doSubmit() {
        bootstrap.Modal.getInstance(document.getElementById('pModal')).hide();
        Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        
        const body = {
            date: document.getElementById('date').value,
            subject: document.getElementById('subject').value,
            detail: document.getElementById('detail').value,
            suggestion: document.getElementById('suggestion').value,
            recorder: document.getElementById('recorder').value,
            image1: b1, image2: b2
        };

        try {
            const res = await fetch(APP_URL, { method: 'POST', body: JSON.stringify(body) });
            const data = await res.json();
// ค้นหาช่วงบรรทัดที่ตรวจสอบ if(result.status === 'success') หรือ if(data.status === 'success')
if (data.status === 'success') {
    Swal.fire({
        icon: 'success',
        title: 'บันทึกสำเร็จ!',
        text: 'ระบบสร้างไฟล์รายงานเรียบร้อยแล้วค่ะ',
        confirmButtonText: '📂 ดูรายงาน PDF', // ปรับข้อความปุ่มตรงนี้
        confirmButtonColor: '#1e3a8a',      // ปรับสีปุ่มให้เข้ากับโทนโรงเรียน
        allowOutsideClick: false
    }).then((result) => {
        if (result.isConfirmed) {
            // เมื่อคลิกปุ่ม "ดูรายงาน PDF" ให้เปิดหน้าต่างใหม่
            window.open(data.viewUrl, '_blank');
        }
    });

    // ล้างค่าในฟอร์มหลังจากบันทึกเสร็จ
    document.getElementById('reportForm').reset();
    document.querySelectorAll('.img-preview-box').forEach(i => i.style.display = 'none');
    b1 = b2 = ""; 
}
        } catch (e) { Swal.fire('เกิดข้อผิดพลาด', e.toString(), 'error'); }
    }
</script>
</body>
</html>
