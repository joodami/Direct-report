<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกการปฏิบัติงาน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f2f5; }
        .header-banner { 
            background: linear-gradient(45deg, #1e3a8a, #3b82f6); 
            color: white; padding: 40px 15px; border-radius: 0 0 30px 30px; 
        }
        .main-card { border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border: none; margin-top: -30px; }
        .form-label { font-weight: bold; color: #1e3a8a; }
        .preview-img { width: 100%; border-radius: 10px; margin-top: 10px; display: none; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="header-banner text-center shadow">
    <h2 class="fw-bold">ระบบบันทึกการปฏิบัติงาน</h2>
    <p>โรงเรียนพิมานพิทยาสรรค์</p>
</div>

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card main-card">
                <div class="card-body p-4">
                    <form id="reportForm">
                        <div class="mb-3"><label class="form-label">วันที่ปฏิบัติงาน</label><input type="date" id="date" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">เรื่อง</label><input type="text" id="subject" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">รายละเอียดการปฏิบัติงานและผลการปฏิบัติงาน</label><textarea id="detail" class="form-control" rows="3" required></textarea></div>
                        <div class="mb-3"><label class="form-label">ข้อเสนอแนะ</label><input type="text" id="suggestion" class="form-control"></div>
                        <div class="mb-4"><label class="form-label">ผู้บันทึก</label><input type="text" id="recorder" class="form-control" required></div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">รูปประกอบ 1</label>
                                <input type="file" id="img1" class="form-control" accept="image/*" required>
                                <img id="v1" class="preview-img">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">รูปประกอบ 2</label>
                                <input type="file" id="img2" class="form-control" accept="image/*" required>
                                <img id="v2" class="preview-img">
                            </div>
                        </div>

                        <button type="button" class="btn btn-primary w-100 py-3 fw-bold shadow" onclick="sendData()">บันทึกและสร้างไฟล์ PDF</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbxMjxnMTPdSR_R8hZNivLhIr-8k4wKun7xs-DsHNUTNvpoVhz4SF8gEetNm5YD_-gwu/exec";
    let b1 = "", b2 = "";

    function handleFile(input, view) {
        document.getElementById(input).addEventListener('change', e => {
            const reader = new FileReader();
            reader.onload = ev => {
                if(input === 'img1') b1 = ev.target.result; else b2 = ev.target.result;
                const img = document.getElementById(view);
                img.src = ev.target.result; img.style.display = 'block';
            }
            reader.readAsDataURL(e.target.files[0]);
        });
    }
    handleFile('img1', 'v1'); handleFile('img2', 'v2');

    async function sendData() {
        const payload = {
            date: document.getElementById('date').value,
            subject: document.getElementById('subject').value,
            detail: document.getElementById('detail').value,
            suggestion: document.getElementById('suggestion').value,
            recorder: document.getElementById('recorder').value,
            image1: b1, image2: b2
        };

        if(!payload.date || !b1 || !b2) return Swal.fire('เตือน', 'กรุณากรอกข้อมูลและรูปภาพให้ครบค่ะ', 'warning');

        Swal.fire({ title: 'กำลังสร้างไฟล์...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        try {
            const res = await fetch(URL, { method: 'POST', body: JSON.stringify(payload) });
            const data = await res.json();
            if(data.status === 'success') {
                Swal.fire({
                    icon: 'success', title: 'สำเร็จ!',
                    html: '<div style="font-size:14px; white-space:nowrap;">สร้างรายงาน PDF เรียบร้อยแล้วค่ะ</div>',
                    confirmButtonText: 'เปิดไฟล์รายงาน'
                }).then(() => window.open(data.viewUrl, '_blank'));
                document.getElementById('reportForm').reset();
                document.querySelectorAll('.preview-img').forEach(i => i.style.display='none');
            }
        } catch (e) { Swal.fire('Error', e.toString(), 'error'); }
    }
</script>
</body>
</html>
